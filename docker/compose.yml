services:
    amatsukaze:
        image: amatsukaze
        container_name: amatsukaze
        build:
          context: ./
          dockerfile: Dockerfile
          args:
            ENABLE_FASTER_WHISPER: "0"  # Faster-Whisper-XXLを含める場合は "1" に変更
            ENABLE_VCEENCC: "0"  # VCEEncCを含める場合は "1" に変更
        restart: always
        ports:
          - "32768:32768"
          - "32769:32769"
        environment:
          # Amatsukazeを実行するユーザーIDとグループIDを指定
          - RUN_UID=1000
          - RUN_GID=1000
          - NVIDIA_VISIBLE_DEVICES=all
          - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video,graphics
          - VK_ICD_FILENAMES=/etc/vulkan/icd.d/nvidia_egl_icd.json
        volumes:
          - ./avs:/app/avs
          - ./bat:/app/bat
          - ./config:/app/config
          - ./data:/app/data
          - ./drcs:/app/drcs
          - ./JL:/app/JL
          - ./logo:/app/logo
          - ./profile:/app/profile
          - ./input:/app/input
          - ./output:/app/output
          - ./tmp:/app/tmp
          - /mnt:/mnt
        # QSVEncC/VCEEncCを使うための設定
        # /dev/driが環境にない場合は無効化が必要
        devices:
          - /dev/dri:/dev/dri
        # CUDA/NVEncCを使うための設定
        # ホスト側にNVIDIA Graphics DriverとNVIDIA Container Toolkitのインストールが必要
        # NVIDIA GPUが環境にない場合は無効化が必要
        deploy:
          resources:
            reservations:
              devices:
                - driver: nvidia
                  count: all
                  capabilities: [compute, utility, video, graphics]
